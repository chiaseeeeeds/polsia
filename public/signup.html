<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign up - Runloop</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #08090d;
      --surface: #0f1117;
      --border: #1a1d27;
      --text: #e8e9ed;
      --text-dim: #7a7f8e;
      --accent: #00e599;
      --accent-dim: rgba(0, 229, 153, 0.12);
      --error: #ef4444;
      --error-dim: rgba(239, 68, 68, 0.12);
    }

    body {
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* Subtle background radial glow */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(circle at 50% 0%, rgba(0, 229, 153, 0.03) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    .auth-wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      padding: 20px;
    }

    /* Glow behind card */
    .card-glow {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 340px;
      height: 340px;
      background: radial-gradient(circle, rgba(0, 229, 153, 0.06) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
      filter: blur(40px);
      z-index: -1;
    }

    .auth-card {
      background-color: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px;
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.02),
        0 4px 24px rgba(0, 0, 0, 0.3),
        0 8px 48px rgba(0, 0, 0, 0.2);
      transition: box-shadow 0.3s ease;
    }

    .auth-card:hover {
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.03),
        0 4px 24px rgba(0, 0, 0, 0.35),
        0 12px 56px rgba(0, 0, 0, 0.25);
    }

    /* Logo */
    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 32px;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background-color: var(--accent);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .logo-icon svg {
      width: 20px;
      height: 20px;
    }

    .logo-text {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 22px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.02em;
    }

    /* Heading */
    .auth-heading {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 24px;
      font-weight: 600;
      text-align: center;
      margin-bottom: 4px;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    .auth-subheading {
      font-size: 14px;
      color: var(--text-dim);
      text-align: center;
      margin-bottom: 32px;
      line-height: 1.5;
    }

    /* Form */
    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-dim);
      margin-bottom: 6px;
      letter-spacing: 0.01em;
    }

    .form-input {
      width: 100%;
      height: 44px;
      padding: 0 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      color: var(--text);
      background-color: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .form-input::placeholder {
      color: var(--text-dim);
      opacity: 0.5;
    }

    .form-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }

    .form-input:hover:not(:focus) {
      border-color: #252836;
    }

    .form-input.input-error {
      border-color: var(--error);
      box-shadow: 0 0 0 3px var(--error-dim);
    }

    /* Password strength indicator */
    .password-strength {
      display: flex;
      gap: 4px;
      margin-top: 8px;
      height: 3px;
    }

    .password-strength .bar {
      flex: 1;
      background-color: var(--border);
      border-radius: 2px;
      transition: background-color 0.3s ease;
    }

    .password-strength.strength-1 .bar:nth-child(1) {
      background-color: var(--error);
    }

    .password-strength.strength-2 .bar:nth-child(1),
    .password-strength.strength-2 .bar:nth-child(2) {
      background-color: #f59e0b;
    }

    .password-strength.strength-3 .bar:nth-child(1),
    .password-strength.strength-3 .bar:nth-child(2),
    .password-strength.strength-3 .bar:nth-child(3) {
      background-color: #22c55e;
    }

    .password-strength.strength-4 .bar {
      background-color: var(--accent);
    }

    .password-hint {
      font-size: 12px;
      color: var(--text-dim);
      margin-top: 6px;
      opacity: 0.7;
      transition: color 0.2s ease;
    }

    .password-hint.hint-error {
      color: var(--error);
      opacity: 1;
    }

    /* Submit button */
    .btn-submit {
      width: 100%;
      height: 44px;
      margin-top: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 600;
      color: var(--bg);
      background-color: var(--accent);
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s ease;
      position: relative;
      overflow: hidden;
      letter-spacing: 0.01em;
    }

    .btn-submit:hover {
      background-color: #00cc88;
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(0, 229, 153, 0.25);
    }

    .btn-submit:active {
      transform: translateY(0);
      box-shadow: none;
    }

    .btn-submit:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .btn-submit .spinner {
      display: none;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(8, 9, 13, 0.3);
      border-top-color: var(--bg);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    .btn-submit.loading .btn-label {
      display: none;
    }

    .btn-submit.loading .spinner {
      display: inline-block;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Error message */
    .error-message {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 12px 14px;
      margin-bottom: 20px;
      font-size: 13px;
      color: var(--error);
      background-color: var(--error-dim);
      border: 1px solid rgba(239, 68, 68, 0.2);
      border-radius: 10px;
      line-height: 1.4;
      animation: slideIn 0.2s ease;
    }

    .error-message.visible {
      display: flex;
    }

    .error-message svg {
      flex-shrink: 0;
      width: 16px;
      height: 16px;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-4px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Footer link */
    .auth-footer {
      text-align: center;
      margin-top: 24px;
      font-size: 13px;
      color: var(--text-dim);
    }

    .auth-footer a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.15s ease;
    }

    .auth-footer a:hover {
      color: #33eaad;
      text-decoration: underline;
    }

    /* Responsive */
    @media (max-width: 480px) {
      .auth-card {
        padding: 28px 24px;
        border-radius: 12px;
      }

      .auth-heading {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="auth-wrapper">
    <div class="card-glow"></div>
    <div class="auth-card">
      <div class="logo">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="#08090d" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
          </svg>
        </div>
        <span class="logo-text">Runloop</span>
      </div>

      <h1 class="auth-heading">Create your account</h1>
      <p class="auth-subheading">Get started with Runloop in seconds</p>

      <div class="error-message" id="errorMessage">
        <svg viewBox="0 0 16 16" fill="currentColor">
          <path d="M8 1a7 7 0 1 0 0 14A7 7 0 0 0 8 1ZM7.25 5a.75.75 0 0 1 1.5 0v3a.75.75 0 0 1-1.5 0V5Zm.75 6.5a.75.75 0 1 1 0-1.5.75.75 0 0 1 0 1.5Z"/>
        </svg>
        <span id="errorText"></span>
      </div>

      <form id="signupForm" novalidate>
        <div class="form-group">
          <label class="form-label" for="name">Full name</label>
          <input
            class="form-input"
            type="text"
            id="name"
            name="name"
            placeholder="Jane Smith"
            autocomplete="name"
            required
          >
        </div>

        <div class="form-group">
          <label class="form-label" for="email">Email</label>
          <input
            class="form-input"
            type="email"
            id="email"
            name="email"
            placeholder="you@example.com"
            autocomplete="email"
            required
          >
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input
            class="form-input"
            type="password"
            id="password"
            name="password"
            placeholder="Minimum 8 characters"
            autocomplete="new-password"
            required
          >
          <div class="password-strength" id="passwordStrength">
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
          </div>
          <p class="password-hint" id="passwordHint">Use 8 or more characters</p>
        </div>

        <div class="form-group">
          <label class="form-label" for="confirmPassword">Confirm password</label>
          <input
            class="form-input"
            type="password"
            id="confirmPassword"
            name="confirmPassword"
            placeholder="Re-enter your password"
            autocomplete="new-password"
            required
          >
        </div>

        <button class="btn-submit" type="submit" id="submitBtn">
          <span class="btn-label">Create Account</span>
          <span class="spinner"></span>
        </button>
      </form>

      <p class="auth-footer">
        Already have an account? <a href="/login.html">Log in</a>
      </p>
    </div>
  </div>

  <script>
    const form = document.getElementById('signupForm');
    const errorMessage = document.getElementById('errorMessage');
    const errorText = document.getElementById('errorText');
    const submitBtn = document.getElementById('submitBtn');
    const passwordInput = document.getElementById('password');
    const confirmPasswordInput = document.getElementById('confirmPassword');
    const passwordStrength = document.getElementById('passwordStrength');
    const passwordHint = document.getElementById('passwordHint');

    function showError(message) {
      errorText.textContent = message;
      errorMessage.classList.add('visible');
    }

    function hideError() {
      errorMessage.classList.remove('visible');
    }

    function setLoading(loading) {
      submitBtn.classList.toggle('loading', loading);
      submitBtn.disabled = loading;
    }

    // Password strength calculation
    function getPasswordStrength(password) {
      let score = 0;
      if (password.length >= 8) score++;
      if (password.length >= 12) score++;
      if (/[A-Z]/.test(password) && /[a-z]/.test(password)) score++;
      if (/[0-9]/.test(password)) score++;
      if (/[^A-Za-z0-9]/.test(password)) score++;
      return Math.min(4, score);
    }

    passwordInput.addEventListener('input', () => {
      const password = passwordInput.value;
      const strength = getPasswordStrength(password);

      // Reset classes
      passwordStrength.className = 'password-strength';
      passwordHint.className = 'password-hint';

      if (password.length === 0) {
        passwordHint.textContent = 'Use 8 or more characters';
        return;
      }

      if (password.length < 8) {
        passwordStrength.classList.add('strength-1');
        passwordHint.textContent = 'Password must be at least 8 characters';
        passwordHint.classList.add('hint-error');
        return;
      }

      passwordStrength.classList.add('strength-' + strength);

      const labels = ['', 'Weak', 'Fair', 'Strong', 'Very strong'];
      passwordHint.textContent = labels[strength] || '';
    });

    // Confirm password visual feedback
    confirmPasswordInput.addEventListener('input', () => {
      const password = passwordInput.value;
      const confirm = confirmPasswordInput.value;

      if (confirm.length > 0 && password !== confirm) {
        confirmPasswordInput.classList.add('input-error');
      } else {
        confirmPasswordInput.classList.remove('input-error');
      }
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideError();

      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = passwordInput.value;
      const confirmPassword = confirmPasswordInput.value;

      // Client-side validation
      if (!name) {
        showError('Please enter your full name.');
        return;
      }

      if (!email) {
        showError('Please enter your email address.');
        return;
      }

      // Basic email format check
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!emailRegex.test(email)) {
        showError('Please enter a valid email address.');
        return;
      }

      if (!password) {
        showError('Please enter a password.');
        return;
      }

      if (password.length < 8) {
        showError('Password must be at least 8 characters long.');
        return;
      }

      if (!confirmPassword) {
        showError('Please confirm your password.');
        return;
      }

      if (password !== confirmPassword) {
        showError('Passwords do not match. Please try again.');
        confirmPasswordInput.classList.add('input-error');
        return;
      }

      setLoading(true);

      try {
        const response = await fetch('/api/auth/signup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password }),
        });

        const data = await response.json();

        if (!response.ok) {
          showError(data.message || data.error || 'Something went wrong. Please try again.');
          setLoading(false);
          return;
        }

        // Success - redirect to onboarding
        window.location.href = data.redirectUrl || '/onboarding';
      } catch (err) {
        showError('Unable to connect. Please check your connection and try again.');
        setLoading(false);
      }
    });

    // Clear error on input
    document.querySelectorAll('.form-input').forEach((input) => {
      input.addEventListener('input', hideError);
    });
  </script>
</body>
</html>
